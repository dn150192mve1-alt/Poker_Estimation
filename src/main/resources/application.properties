spring.application.name=Poker Estimation
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/poker_estimation}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.websocket.message-broker.application-destination-prefix=/app
spring.websocket.message-broker.topic-prefix=/topic
