services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-estimation-postgres
    environment:
      POSTGRES_DB: poker_estimation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poker_estimation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: gradle:8.12-jdk21
    container_name: poker-estimation-app
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/poker_estimation
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle
    command: ["gradle", "bootRun"]

volumes:
  postgres-data:
  gradle-cache:
